<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Veículos | Vendas</title>
    <style>
        body{
            margin: 0;
            padding: 30px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: white;
            color: #222;
        }
        .container{
            max-width: 1000px;
            margin: 0 auto;
            background-color:white ;
            padding: 30px;
            border: 12px;
            box-shadow: 0 4px 14px rgba(red, green, blue, alpha);
        }
        h1{
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="./jeep.compass.webp" alt="Jeep Compass">

        <h1>Tabela de Veículos | Vendas</h1>
        <p class="descricao">
            Tabela modelo de venda, com as melhores marcas do mercado!
        </p>    
        <table>
    <thead>
        <tr>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Ano</th>
        </tr>
    </thead>

    <tbody>
        <!-- Jeep -->
        <tr>
            <td>Jeep</td>
            <td>
                <div class="imagem-carros">
                    <img src="./jeep.compass.webp" alt="Jeep Compass"/>
                    <span>Compass</span>
                </div>
            </td>
            <td>2023</td>
        </tr>

        <tr>
            <td>Jeep</td>
            <td>
                <div class="imagem-carros">
                    <img src="./jeep.renegade.webp" alt="Jeep Renegade"/>
                    <span>Renegade</span>
                </div>
            </td>
            <td>2022</td>
        </tr>

        <tr>
            <td>Jeep</td>
            <td>
                <div class="imagem-carros">
                    <img src="./jeep.rubicon.webp" alt="Jeep Rubicon"/>
                    <span>Rubicon</span>
                </div>
            </td>
            <td>2021</td>
        </tr>

        <!-- Ford -->
        <tr>
            <td>Ford</td>
            <td>
                <img src="./ford.ka.jpg" alt="Ford Ka"/>
                <span>Ka</span>
            </td>
            <td>2020</td>
        </tr>

        <tr>
            <td>Ford</td>
            <td>
                <img src="./ford.fiesta.webp" alt="Ford Fiesta"/>
                <span>Fiesta</span>
            </td>
            <td>2019</td>
        </tr>

        <!-- Chevrolet -->
        <tr>
            <td>Chevrolet</td>
            <td>
                <img src="./chevrolet.impala67.jpg" alt="Impala 67"/>
                <span>Impala 67</span>
            </td>
            <td>1967</td>
        </tr>
    </tbody>
<!-- Rodapé Tabela -->
    <tfoot>
        <tr>
            <td colspan="3">Últimas atualização: 24/03/2026</td>
        </tr>
    </tfoot>
</table>

    <img class="rodape-imagem" src="jeep.rubicon.webp" alt="Logotipo da Loja Master Multimarcas"/>

    </div>
    
</body>
</html>
