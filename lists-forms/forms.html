<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style_forms.css">
    <title>Formulário de Cadastro</title>

</head>

<body>

    <div class="container">
        <h1>Cadastro de Usuário</h1>
        <p>Preencha os dados abaixo para se cadastrar na plataforma</p>

        <form>

            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <div>
                <label for="data">Data de Nascimento</label>
                <input type="date" id="data" name="data">
            </div>

            <div>
                <label for="curso">Curso</label>
                <select id="curso" name="curso">
                    <option value="">Selecione</option>
                    <option value="ads">Análise e Desenvolvimento de Sistemas</option>
                    <option value="si">Sistemas de Informação</option>
                    <option value="eng">Engenharia de Software</option>
                </select>
            </div>

            <div>
                <label>Gênero</label>
                <div class="inline">
                    <input type="radio" id="masc" name="genero" value="masculino">
                    <label for="masc">Masculino</label>

                    <input type="radio" id="fem" name="genero" value="feminino">
                    <label for="fem">Feminino</label>
                </div>
            </div>

            <div>
                <label>Interesses</label>
                <div class="inline">
                    <input type="checkbox" id="tech" name="interesses">
                    <label for="tech">Tecnologia</label>

                    <input type="checkbox" id="games" name="interesses">
                    <label for="games">Games</label>

                    <input type="checkbox" id="design" name="interesses">
                    <label for="design">Design</label>
                </div>
            </div>

            <div>
                <label for="arquivo">Upload de Arquivo</label>
                <input type="file" id="arquivo" name="arquivo">
            </div>

            <div>
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="4"></textarea>
            </div>

            <div class="botoes">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>

        </form>
    </div>

</body>
</html>
